name: Build and publish WebAR site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile MindAR target
        run: npm run compile-target

      - name: Build
        run: npm run build

      - name: Publish dist to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add gh-pages-worktree origin/gh-pages
          cd gh-pages-worktree
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cd ..
          cp -R dist/. gh-pages-worktree/
          cd gh-pages-worktree
          git add -A
          git commit -m "deploy: update GitHub Pages" || exit 0
          git push origin HEAD:gh-pages
